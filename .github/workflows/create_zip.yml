name: Create Kodi Plugin Zip and Attach to Release

on:
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Addon ID and Version
        id: addon_info
        run: |
          ADDON_ID=$(grep -oP 'id="\K[^"]+' addon.xml)
          VERSION=$(grep -oP 'version="\K[^"]+' addon.xml)
          echo "ADDON_ID=$ADDON_ID" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Plugin Zip
        run: |
          ADDON_ID="${{ steps.addon_info.outputs.ADDON_ID }}"
          VERSION="${{ steps.addon_info.outputs.VERSION }}"
          ZIP_FILENAME="$ADDON_ID-$VERSION.zip"
          TEMP_DIR="./$ADDON_ID"
          mkdir -p "$TEMP_DIR"
          rsync -av --exclude '.git/' --exclude '.github/' --exclude '*.zip' . "$TEMP_DIR"
          zip -r "$ZIP_FILENAME" "$TEMP_DIR"
          rm -rf "$TEMP_DIR"
          echo "ZIP_FILENAME=$ZIP_FILENAME" >> $GITHUB_OUTPUT

      - name: Upload Zip to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP_FILENAME="${{ steps.addon_info.outputs.ADDON_ID }}-${{ steps.addon_info.outputs.VERSION }}.zip"
          gh release upload ${{ github.ref_name }} "$ZIP_FILENAME" --clobber
